<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลุ้นหวย!</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&amp;family=Kanit:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes popIn {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      50% { transform: scale(1.2) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100%) rotate(720deg); opacity: 0; }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
      50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6), 0 0 80px rgba(255, 215, 0, 0.3); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes number-roll {
      0% { transform: translateY(-100%); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .animate-pop { animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
    .animate-shake { animation: shake 0.6s ease-in-out; }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .animate-spin-slow { animation: spin-slow 20s linear infinite; }

    .shimmer-text {
      background: linear-gradient(90deg, #ffd700, #fff, #ffd700, #fff, #ffd700);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      z-index: 100;
      pointer-events: none;
    }

    .lottery-ball {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.25rem;
      font-family: 'Kanit', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .lottery-ball::before {
      content: '';
      position: absolute;
      top: 5px;
      left: 10px;
      width: 15px;
      height: 8px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      transform: rotate(-30deg);
    }

    .btn-lottery {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .btn-lottery::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }

    .btn-lottery:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn-lottery:active {
      transform: scale(0.95);
    }

    .rolling .lottery-ball span {
      animation: number-roll 0.15s ease-in-out;
    }

    .stat-card {
      backdrop-filter: blur(10px);
      transition: transform 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-2px);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 30%, #2d1b69 60%, #0a0a2e 100%); font-family: 'Prompt', sans-serif;"><!-- Decorative spinning circle -->
   <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] opacity-5 pointer-events-none animate-spin-slow">
    <svg viewbox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="90" stroke="#ffd700" stroke-width="0.5" stroke-dasharray="5 5" /> <circle cx="100" cy="100" r="70" stroke="#ffd700" stroke-width="0.3" stroke-dasharray="3 7" /> <circle cx="100" cy="100" r="50" stroke="#ffd700" stroke-width="0.3" />
    </svg>
   </div>
   <div class="relative z-10 flex flex-col items-center justify-center min-h-full px-4 py-8"><!-- Header -->
    <header class="text-center mb-8">
     <div class="animate-float inline-block mb-4">
      <div class="text-6xl">
       🎰
      </div>
     </div>
     <h1 id="mainTitle" class="text-4xl md:text-5xl font-black text-transparent bg-clip-text mb-3" style="background: linear-gradient(135deg, #ffd700, #ffec80, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Kanit', sans-serif;">ลุ้นหวย!</h1>
    </header><!-- Lottery Balls -->
    <main class="w-full max-w-lg">
     <div id="ballContainer" class="flex justify-center gap-2 md:gap-3 mb-8 flex-wrap">
      <div class="lottery-ball bg-gradient-to-br from-red-400 to-red-600 text-white shadow-lg shadow-red-500/30">
       <span>?</span>
      </div>
      <div class="lottery-ball bg-gradient-to-br from-blue-400 to-blue-600 text-white shadow-lg shadow-blue-500/30">
       <span>?</span>
      </div>
      <div class="lottery-ball bg-gradient-to-br from-green-400 to-green-600 text-white shadow-lg shadow-green-500/30">
       <span>?</span>
      </div>
      <div class="lottery-ball bg-gradient-to-br from-yellow-400 to-yellow-600 text-white shadow-lg shadow-yellow-500/30">
       <span>?</span>
      </div>
      <div class="lottery-ball bg-gradient-to-br from-purple-400 to-purple-600 text-white shadow-lg shadow-purple-500/30">
       <span>?</span>
      </div>
      <div class="lottery-ball bg-gradient-to-br from-pink-400 to-pink-600 text-white shadow-lg shadow-pink-500/30">
       <span>?</span>
      </div>
     </div><!-- Draw Button -->
     <div class="flex justify-center mb-8"><button id="drawBtn" class="btn-lottery bg-gradient-to-r from-yellow-500 via-amber-500 to-yellow-600 text-gray-900 font-bold text-xl px-10 py-4 rounded-2xl shadow-xl shadow-yellow-500/30 animate-pulse-glow" style="font-family: 'Kanit', sans-serif;"> <span class="flex items-center gap-3"> <i data-lucide="sparkles" style="width:24px;height:24px;"></i> กดเสี่ยงโชค! <i data-lucide="sparkles" style="width:24px;height:24px;"></i> </span> </button>
     </div><!-- Result Message -->
     <div id="resultArea" class="text-center mb-8 min-h-[80px] flex items-center justify-center">
      <p class="text-purple-400/60 text-lg">กดปุ่มเพื่อลุ้นรางวัล...</p>
     </div><!-- Stats -->
     <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="stat-card bg-white/5 border border-white/10 rounded-xl p-3 text-center">
       <p class="text-purple-400 text-xs mb-1">จำนวนครั้ง</p>
       <p id="totalDraws" class="text-white font-bold text-xl" style="font-family:'Kanit',sans-serif;">0</p>
      </div>
      <div class="stat-card bg-white/5 border border-white/10 rounded-xl p-3 text-center">
       <p class="text-green-400 text-xs mb-1">ถูกรางวัล</p>
       <p id="totalWins" class="text-green-400 font-bold text-xl" style="font-family:'Kanit',sans-serif;">0</p>
      </div>
      <div class="stat-card bg-white/5 border border-white/10 rounded-xl p-3 text-center">
       <p class="text-red-400 text-xs mb-1">ไม่ถูกรางวัล</p>
       <p id="totalLosses" class="text-red-400 font-bold text-xl" style="font-family:'Kanit',sans-serif;">0</p>
      </div>
     </div><!-- Quick Draw -->
     <div class="flex justify-center gap-3 mb-6"><button id="draw10Btn" class="bg-white/10 hover:bg-white/20 text-white text-sm px-4 py-2 rounded-lg transition-all border border-white/10"> เสี่ยง 10 ครั้ง </button> <button id="draw100Btn" class="bg-white/10 hover:bg-white/20 text-white text-sm px-4 py-2 rounded-lg transition-all border border-white/10"> เสี่ยง 100 ครั้ง </button> <button id="draw1000Btn" class="bg-white/10 hover:bg-white/20 text-white text-sm px-4 py-2 rounded-lg transition-all border border-white/10"> เสี่ยง 1,000 ครั้ง </button>
     </div><!-- Probability Info -->
     <div class="bg-white/5 border border-white/10 rounded-xl p-4 text-center">
      <p class="text-purple-300 text-xs mb-2">📊 สถิติความน่าจะเป็น</p>
      <p id="probabilityText" class="text-white/70 text-xs leading-relaxed">โอกาสถูกหวย: <span class="text-yellow-400 font-bold">0.000001%</span><br>
        เทียบเท่ากับโอกาสที่จะถูกฟ้าผ่า <span class="text-yellow-400">80 ครั้ง</span> ในชีวิต ⚡</p>
     </div>
    </main>
   </div><!-- Confetti container -->
   <div id="confettiContainer"></div>
  </div>
  <script>
    // --- Config & State ---
    const defaultConfig = {
      main_title: 'ลุ้นหวย!',
      win_message: '🎉 ยินดีด้วย! คุณถูกหวย!',
      lose_message: '😢 พยายามเข้านะ!',
      background_color: '#0a0a2e',
      surface_color: '#1a0a3e',
      text_color: '#e9d5ff',
      primary_action_color: '#f59e0b',
      secondary_action_color: '#a78bfa',
      font_family: 'Prompt',
      font_size: 16
    };

    let stats = { draws: 0, wins: 0, losses: 0 };
    let isRolling = false;

    const ODDS = 100_000_000; // 1 in 100 million

    // --- Elements ---
    const els = {};
    function cacheEls() {
      els.app = document.getElementById('app');
      els.mainTitle = document.getElementById('mainTitle');
      els.ballContainer = document.getElementById('ballContainer');
      els.drawBtn = document.getElementById('drawBtn');
      els.resultArea = document.getElementById('resultArea');
      els.totalDraws = document.getElementById('totalDraws');
      els.totalWins = document.getElementById('totalWins');
      els.totalLosses = document.getElementById('totalLosses');
    }

    // --- Lottery Logic ---
    function isWin() {
      return Math.random() < (1 / ODDS);
    }

    function randomDigit() {
      return Math.floor(Math.random() * 10);
    }

    function rollBalls(callback) {
      const balls = els.ballContainer.querySelectorAll('.lottery-ball span');
      els.ballContainer.classList.add('rolling');
      let rollCount = 0;
      const maxRolls = 15;

      const interval = setInterval(() => {
        balls.forEach(b => {
          b.textContent = randomDigit();
        });
        rollCount++;
        if (rollCount >= maxRolls) {
          clearInterval(interval);
          els.ballContainer.classList.remove('rolling');
          callback();
        }
      }, 80);
    }

    function showResult(won) {
      const config = window.elementSdk ? window.elementSdk.config : defaultConfig;
      const winMsg = config.win_message || defaultConfig.win_message;
      const loseMsg = config.lose_message || defaultConfig.lose_message;

      if (won) {
        els.resultArea.innerHTML = `
          <div class="animate-pop">
            <p class="text-3xl font-black shimmer-text mb-2" style="font-family:'Kanit',sans-serif;">${winMsg}</p>
            <p class="text-yellow-300 text-sm">คุณเป็น 1 ในร้อยล้านคน! 🌟</p>
          </div>`;
        launchConfetti();
      } else {
        els.resultArea.innerHTML = `
          <div class="animate-shake">
            <p class="text-2xl font-bold text-red-300 mb-1" style="font-family:'Kanit',sans-serif;">${loseMsg}</p>
            <p class="text-purple-400/60 text-sm">ลองอีกครั้งสิ! โชคอาจจะมาถึงเร็วๆ นี้</p>
          </div>`;
      }
    }

    function updateStats() {
      els.totalDraws.textContent = stats.draws.toLocaleString();
      els.totalWins.textContent = stats.wins.toLocaleString();
      els.totalLosses.textContent = stats.losses.toLocaleString();
    }

    function singleDraw() {
      if (isRolling) return;
      isRolling = true;
      els.drawBtn.disabled = true;
      els.drawBtn.classList.remove('animate-pulse-glow');

      rollBalls(() => {
        const won = isWin();
        stats.draws++;
        if (won) stats.wins++; else stats.losses++;
        updateStats();
        showResult(won);
        isRolling = false;
        els.drawBtn.disabled = false;
        els.drawBtn.classList.add('animate-pulse-glow');
      });
    }

    function multiDraw(count) {
      if (isRolling) return;
      isRolling = true;
      let wins = 0;
      for (let i = 0; i < count; i++) {
        if (isWin()) wins++;
      }
      stats.draws += count;
      stats.wins += wins;
      stats.losses += (count - wins);
      updateStats();

      // Update balls to random numbers
      const balls = els.ballContainer.querySelectorAll('.lottery-ball span');
      balls.forEach(b => b.textContent = randomDigit());

      if (wins > 0) {
        els.resultArea.innerHTML = `
          <div class="animate-pop">
            <p class="text-2xl font-black shimmer-text mb-2" style="font-family:'Kanit',sans-serif;">🎉 ถูกรางวัล ${wins} ครั้ง จาก ${count.toLocaleString()} ครั้ง!</p>
            <p class="text-yellow-300 text-sm">โชคดีมาก! ✨</p>
          </div>`;
        launchConfetti();
      } else {
        els.resultArea.innerHTML = `
          <div class="animate-shake">
            <p class="text-xl font-bold text-red-300 mb-1" style="font-family:'Kanit',sans-serif;">ไม่ถูกเลยสักครั้ง จาก ${count.toLocaleString()} ครั้ง</p>
            <p class="text-purple-400/60 text-sm">นี่แหละความจริงของหวย... 💸</p>
          </div>`;
      }
      isRolling = false;
    }

    // --- Confetti ---
    function launchConfetti() {
      const container = document.getElementById('confettiContainer');
      const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#ff9ff3', '#54a0ff'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.width = (Math.random() * 8 + 5) + 'px';
        piece.style.height = (Math.random() * 8 + 5) + 'px';
        piece.style.animation = `confetti-fall ${Math.random() * 2 + 1.5}s ease-out ${Math.random() * 0.5}s forwards`;
        container.appendChild(piece);
      }
      setTimeout(() => { container.innerHTML = ''; }, 4000);
    }

    // --- Element SDK ---
    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };

      // Title
      els.mainTitle.textContent = c.main_title;

      // Colors
      els.app.style.background = `linear-gradient(135deg, ${c.background_color} 0%, ${c.surface_color} 50%, ${c.background_color} 100%)`;

      // Text color
      document.querySelectorAll('.stat-card p:first-child').forEach(el => {
        // keep stat label colors
      });

      // Primary action (button)
      els.drawBtn.style.background = `linear-gradient(135deg, ${c.primary_action_color}, ${c.primary_action_color}dd)`;

      // Secondary action
      document.querySelectorAll('#draw10Btn, #draw100Btn, #draw1000Btn').forEach(btn => {
        btn.style.borderColor = c.secondary_action_color + '40';
        btn.style.color = c.secondary_action_color;
      });

      // Font
      const fontStack = `${c.font_family}, Prompt, sans-serif`;
      els.app.style.fontFamily = fontStack;
      els.mainTitle.style.fontFamily = `${c.font_family}, Kanit, sans-serif`;

      // Font size
      const base = c.font_size || 16;
      els.mainTitle.style.fontSize = `${base * 2.8}px`;
      document.querySelectorAll('.stat-card p:last-child').forEach(el => {
        el.style.fontSize = `${base * 1.25}px`;
      });
    }

    // --- Init ---
    cacheEls();

    els.drawBtn.addEventListener('click', singleDraw);
    document.getElementById('draw10Btn').addEventListener('click', () => multiDraw(10));
    document.getElementById('draw100Btn').addEventListener('click', () => multiDraw(100));
    document.getElementById('draw1000Btn').addEventListener('click', () => multiDraw(1000));

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => { applyConfig(config); },
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size,
            set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['main_title', config.main_title || defaultConfig.main_title],
          ['win_message', config.win_message || defaultConfig.win_message],
          ['lose_message', config.lose_message || defaultConfig.lose_message]
        ])
      });
    }

    lucide.createIcons();
  </script>
